name: "subflow: wait-and-match"
vars:
  targetLabel: 蓝牙
outputs: matchedNode
steps:
  - action: waitFor
    label: ${vars.targetLabel}
    timeout: 5
    comment: "子 flow 内部等待目标元素可见"

  - action: dom
    candidates:
      - ${vars.targetLabel}
    outputs: matchedNode
    comment: "子 flow 输出候选命中节点供主 flow 复用"
