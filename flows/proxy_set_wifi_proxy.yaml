name: "proxy: 配置 Wi-Fi HTTP 代理"
app: com.apple.Preferences
vars:
  server: "192.168.1.1"
  port: "9080"
steps:
  - action: activateApp
    bundleId: com.apple.Preferences
    comment: "确保设置在前台"

  - action: openURL
    url: "App-Prefs:"
    comment: "打开设置首页"

  - action: tap
    label: com.apple.settings.wifi
    comment: "进入无线局域网设置"

  - action: waitFor
    label: 信号强度
    traits: "Cell,selected"
    timeout: 5

  - action: tap
    label: 信号强度
    traits: "Cell,selected"
    offset:
      xRatio: 0.9
      yRatio: 0.5
    comment: "点击当前已连接网络行右侧的详情按钮"

  - action: waitFor
    label: 配置代理
    timeout: 5

  - action: swipe
    to: HTTP代理
    comment: "滚动到 HTTP 代理区域"

  - action: tap
    label: 配置代理
    comment: "进入配置代理"

  - action: waitFor
    label: 手动
    timeout: 3

  - action: tap
    label: 手动
    comment: "选择手动模式"

  - action: waitFor
    label: 服务器
    timeout: 3

  - action: input
    label: 服务器
    content: "${server}"
    comment: "填入代理服务器地址"

  - action: input
    label: 端口
    content: "${port}"
    comment: "填入代理端口"

  - action: waitFor
    label: 保存
    timeout: 3

  - action: tap
    label: 保存
    comment: "保存配置"
