name: "test_flow: 核心回归 smoke"
app: com.apple.Preferences
steps:
  - action: runFlow
    file: ./subflow_wait_and_find.yaml
    vars:
      targetLabel: 蓝牙
    outputs: matchedNode
    comment: "验证 subflow、vars、outputs，以及主 flow 复用子 flow 输出"

  - action: find
    label: ${matchedNode.firstMatch.label}
    comment: "验证主 flow 可以消费子 flow 返回的节点信息"

  - action: waitFor
    label: 蓝牙
    timeout: 5
    comment: "确认 Settings 首页已稳定，且入口锚点可唯一命中"

  - action: dom
    outputs: homeDom
    comment: "输出首页 clean DOM，验证 dom action"

  - action: screenshot
    name: test-flow-settings-home
    comment: "记录初始界面"

  - action: find
    label: 蜂窝网络
    comment: "验证 find 可命中首页可见列表项"

  - action: swipe
    distance: 400
    dir: forth
    comment: "固定距离向下滚动，验证 distance-only 路径"

  - action: find
    label: 通用
    comment: "验证滚动后可命中「通用」"

  - action: screenshot
    name: test-flow-after-scroll
    comment: "记录滚动后的页面"

  - action: swipe
    to: "187,650"
    comment: "验证 point swipe 路径"

  - action: oslog
    pattern: "__ios_use_no_such_log_line__"
    timeout: 0.2
    comment: "验证 oslog host-side 路径"

  - action: swipe
    distance: 180
    dir: back
    comment: "固定距离向上回滚，验证 dir=back 路径"

  - action: oslog
    pattern: Preferences
    flags: i
    process: Preferences
    comment: "打印 Settings 过滤视图下的 oslog"

  - action: tap
    label: "100,400"
    comment: "验证 tap action 的坐标路径"

  - action: terminateApp
    bundleId: com.apple.Preferences
    comment: "验证 terminateApp"

  - action: activateApp
    bundleId: com.apple.Preferences
    comment: "验证 activateApp"

  - action: waitFor
    label: 蓝牙
    timeout: 8
    comment: "确认 app 重启后重新回到首页"

  - action: dom
    raw: true
    comment: "输出首页 raw DOM，验证 raw=true"

  - action: screenshot
    name: test-flow-settings-relaunched
    comment: "记录重启后的最终界面"
