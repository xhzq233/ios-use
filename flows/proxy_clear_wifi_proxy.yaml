name: "proxy: 关闭 Wi-Fi HTTP 代理"
app: com.apple.Preferences
steps:
  - action: tap
    label: com.apple.settings.wifi
    comment: "进入无线局域网设置"

  - action: waitFor
    label: 信号强度
    traits: "Cell,selected"
    timeout: 5

  - action: tap
    label: 信号强度
    traits: "Cell,selected"
    offsetRatio: "0.9,0.5"
    comment: "点击当前已连接网络行右侧的详情按钮"

  - action: swipe
    to: 配置代理
    comment: "滚动到 HTTP 代理区域"

  - action: waitFor
    label: 配置代理
    timeout: 3
    comment: "确认配置代理已可见"

  - action: tap
    label: 配置代理
    comment: "进入配置代理"

  - action: sleep
    ms: 500

  - action: waitFor
    label: 关闭
    timeout: 3

  - action: tap
    label: 关闭
    comment: "选择关闭代理"

  - action: tap
    label: 配置代理
    traits: NavigationBar
    offsetRatio: "0.88,0.41"
    comment: "点击右上角确认按钮"
