name: "proxy: 关闭 Wi-Fi HTTP 代理"
app: com.apple.Preferences
steps:
  - action: activateApp
    bundleId: com.apple.Preferences
    comment: "确保设置在前台"

  - action: openURL
    url: "App-Prefs:"
    comment: "打开设置首页"

  - action: tap
    label: com.apple.settings.wifi
    comment: "进入无线局域网设置"

  - action: waitFor
    label: 信号强度
    traits: "Cell,selected"
    timeout: 5

  - action: tap
    label: 信号强度
    traits: "Cell,selected"
    offset:
      xRatio: 0.9
      yRatio: 0.5
    comment: "点击当前已连接网络行右侧的详情按钮"

  - action: waitFor
    label: 配置代理
    timeout: 5

  - action: swipe
    to: 配置代理
    comment: "滚动到配置代理可见"

  - action: tap
    label: 配置代理
    comment: "进入配置代理"

  - action: waitFor
    label: 关闭
    timeout: 3

  - action: tap
    label: 关闭
    comment: "选择关闭代理"

  - action: waitFor
    label: 保存
    timeout: 3

  - action: tap
    label: 保存
    comment: "保存配置"
