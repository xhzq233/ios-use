name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-stack:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run Swift-only stack checks
        env:
          IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000
        run: bash scripts/ci_test.sh
