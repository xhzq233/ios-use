name: CI

on:
  pull_request:
    paths:
      - "swift-cli/**"
      - "shared/**"
      - "driver/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "swift-cli/**"
      - "shared/**"
      - "driver/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000

permissions:
  contents: read

jobs:
  script-syntax:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Check script syntax
        run: |
          for script in scripts/*.sh; do
            bash -n "$script"
          done
          bash scripts/test_install.sh
          node --check scripts/benchmark.js
          node --check scripts/ios_use_test_simulator.js
          node --check scripts/test_simulator_commands.mjs

  swift-cli-tests:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift CLI build
        uses: actions/cache@v4
        with:
          path: swift-cli/.build
          key: ${{ runner.os }}-${{ runner.arch }}-swift-cli-${{ hashFiles('swift-cli/Package.swift', 'swift-cli/Package.resolved', 'swift-cli/Sources/**/*.swift', 'swift-cli/Tests/**/*.swift', 'shared/IOSUseProtocol/Package.swift', 'shared/IOSUseProtocol/Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-cli-

      - name: Run Swift CLI tests and smoke checks
        run: bash scripts/test_swift_cli.sh

  driver-unit-tests:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve Xcode cache key
        id: xcode-cache
        run: |
          xcodebuild -version
          echo "version=$(xcodebuild -version | shasum -a 256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache driver DerivedData
        uses: actions/cache@v4
        with:
          path: driver/build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-${{ hashFiles('driver/project.yml', 'driver/**/*.swift', 'driver/**/*.m', 'driver/**/*.h', 'shared/IOSUseProtocol/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-

      - name: Run Swift driver unit tests
        run: bash scripts/test_driver_unit.sh
