name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_simulator:
        description: "Run full local regression via scripts/test_all.sh"
        required: false
        default: false
        type: boolean
      simulator_cases:
        description: "Run selected Simulator command cases, e.g. IN-1,IN-6"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  unit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun unit tests
        run: bun test

      - name: Run Swift CLI unit tests
        run: bash scripts/test_swift_cli.sh

  full-simulator:
    runs-on: macos-26
    if: github.event_name == 'workflow_dispatch' && (inputs.full_simulator || inputs.simulator_cases != '')
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run full local regression
        if: inputs.full_simulator && inputs.simulator_cases == ''
        env:
          IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000
        run: bash scripts/test_all.sh

      - name: Run selected Simulator command cases
        if: inputs.simulator_cases != ''
        env:
          IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000
          IOS_USE_SIMULATOR_CASES: ${{ inputs.simulator_cases }}
        run: |
          bash scripts/build_swift_cli.sh
          bash scripts/build_driver.sh --simulator-only
          bun scripts/test_simulator_commands.ts --skip-build --case "$IOS_USE_SIMULATOR_CASES"
