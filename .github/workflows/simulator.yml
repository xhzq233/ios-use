name: Full Simulator

on:
  workflow_dispatch:
    inputs:
      full_simulator:
        description: "Run the full Simulator regression matrix"
        required: false
        default: true
        type: boolean
      simulator_cases:
        description: "Run selected Simulator command cases, e.g. IN-1,IN-6"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000

permissions:
  contents: read

jobs:
  full-simulator:
    runs-on: macos-26
    if: inputs.full_simulator || inputs.simulator_cases != ''
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve Xcode cache key
        id: xcode-cache
        run: |
          xcodebuild -version
          echo "version=$(xcodebuild -version | shasum -a 256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache Swift CLI build
        uses: actions/cache@v4
        with:
          path: swift-cli/.build
          key: ${{ runner.os }}-${{ runner.arch }}-swift-cli-${{ hashFiles('swift-cli/Package.swift', 'swift-cli/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-cli-

      - name: Cache driver DerivedData
        uses: actions/cache@v4
        with:
          path: driver/build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-${{ hashFiles('driver/project.yml', 'driver/**/*.swift', 'driver/**/*.m', 'driver/**/*.h', 'shared/IOSUseProtocol/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-

      - name: Build Simulator driver artifact
        run: bash scripts/build_driver.sh --simulator-only

      - name: Run full local regression
        if: inputs.full_simulator && inputs.simulator_cases == ''
        run: bash scripts/ci_full_simulator.sh --driver-ipa .ios-use/driver-sim.ipa

      - name: Run selected Simulator command cases
        if: inputs.simulator_cases != ''
        env:
          IOS_USE_SIMULATOR_CASES: ${{ inputs.simulator_cases }}
        run: bash scripts/ci_full_simulator.sh --driver-ipa .ios-use/driver-sim.ipa --case "$IOS_USE_SIMULATOR_CASES"
