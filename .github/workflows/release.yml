name: Build & Release

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths: ["driver/**"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: cd driver && xcodegen generate

      - name: Boot Simulator for unit tests
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                for d in devices:
                  if d.get('isAvailable'):
                    print(d['udid'])
                    sys.exit(0)
          ")
          xcrun simctl boot "$UDID" 2>/dev/null || true

      - name: Build driver IPA
        run: mkdir -p assets && bash scripts/build_host_app.sh

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "No existing tag found, skipping release upload."
              exit 0
            fi
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Release
        if: steps.resolve_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: assets/driver.ipa
