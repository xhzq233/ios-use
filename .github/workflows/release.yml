name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example v1.0.0"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: macos-26
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "Release workflow must run from a tag push or workflow_dispatch tag input." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_tag.outputs.tag }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Run release gate
        run: bash scripts/ci_test.sh --skip-builds

      - name: Build release assets
        env:
          IOS_USE_RELEASE_VERSION: ${{ steps.resolve_tag.outputs.tag }}
        run: bash scripts/release_build.sh

      - name: Remove stale release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            for asset in ios-use-darwin-arm64 driver.ipa driver-sim.ipa SHA256SUMS; do
              gh release delete-asset "$RELEASE_TAG" "$asset" --yes 2>/dev/null || true
            done
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: release/*
