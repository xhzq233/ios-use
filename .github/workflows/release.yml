name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build Swift CLI
        run: bash scripts/build_swift_cli.sh

      - name: Build driver IPAs
        run: bash scripts/build_driver.sh

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release

          ARCH="$(uname -m)"
          case "$ARCH" in
            arm64) CLI_ASSET="ios-use-darwin-arm64" ;;
            x86_64) CLI_ASSET="ios-use-darwin-x86_64" ;;
            *) echo "Unsupported macOS architecture: $ARCH" >&2; exit 1 ;;
          esac

          cp dist/ios-use "release/${CLI_ASSET}"
          chmod +x "release/${CLI_ASSET}"
          cp assets/driver.ipa release/driver.ipa
          cp assets/driver-sim.ipa release/driver-sim.ipa
          shasum -a 256 release/* > release/SHA256SUMS

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "Release workflow must run from a tag push or workflow_dispatch tag input." >&2
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: release/*
