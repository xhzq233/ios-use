name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example v1.0.0"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IOS_USE_TEST_SIM_BOOT_TIMEOUT_MS: 600000

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: macos-26
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            release_tag="${{ inputs.tag }}"
          else
            echo "Release workflow must run from a tag push or workflow_dispatch tag input." >&2
            exit 1
          fi
          case "$release_tag" in
            v*) ;;
            *)
              echo "Release tag must start with v, for example v1.3.2." >&2
              exit 1
              ;;
          esac
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_tag.outputs.tag }}

      - name: Refuse an existing asset set
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          set +e
          release_probe="$(gh api --include "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" 2>&1)"
          probe_status=$?
          set -e
          http_status="$(printf '%s\n' "$release_probe" | awk 'NR == 1 { print $2 }')"
          if [ "$http_status" = "404" ]; then
            exit 0
          fi
          if [ "$probe_status" -ne 0 ] || [ "$http_status" != "200" ]; then
            echo "Unable to inspect release $RELEASE_TAG (HTTP ${http_status:-unknown})." >&2
            exit 1
          fi
          existing_assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          if [ -n "$existing_assets" ]; then
            echo "Release $RELEASE_TAG already has assets; refusing a mixed or overwritten asset set:" >&2
            printf '%s\n' "$existing_assets" >&2
            echo "Publish a new version instead of retrying this tag." >&2
            exit 1
          fi

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Resolve Xcode cache key
        id: xcode-cache
        run: |
          xcodebuild -version
          echo "version=$(xcodebuild -version | shasum -a 256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache Swift CLI build
        uses: actions/cache@v4
        with:
          path: swift-cli/.build
          key: ${{ runner.os }}-${{ runner.arch }}-swift-cli-${{ hashFiles('swift-cli/Package.swift', 'swift-cli/Package.resolved', 'swift-cli/Sources/**/*.swift', 'swift-cli/Tests/**/*.swift', 'shared/IOSUseProtocol/Package.swift', 'shared/IOSUseProtocol/Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-cli-

      - name: Cache driver DerivedData
        uses: actions/cache@v4
        with:
          path: driver/build/DerivedData
          key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-${{ hashFiles('driver/project.yml', 'driver/**/*.swift', 'driver/**/*.m', 'driver/**/*.h', 'shared/IOSUseProtocol/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-cache.outputs.version }}-driver-

      - name: Build release assets
        env:
          IOS_USE_RELEASE_VERSION: ${{ steps.resolve_tag.outputs.tag }}
        run: bash scripts/release_build.sh

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: release/*
          body_path: release/CHANGELOG-${{ steps.resolve_tag.outputs.tag }}.md
          overwrite_files: false
          fail_on_unmatched_files: true
