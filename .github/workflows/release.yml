name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Boot Simulator for unit tests
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                for d in devices:
                  if d.get('isAvailable'):
                    print(d['udid'])
                    sys.exit(0)
          ")
          xcrun simctl boot "$UDID" 2>/dev/null || true

      - name: Build driver IPA
        run: bash scripts/build_host_app.sh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/driver.ipa
