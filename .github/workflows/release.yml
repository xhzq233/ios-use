name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.asset }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            asset: ios-use-darwin-arm64
          - runner: macos-26-intel
            asset: ios-use-darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift CLI
        run: bash scripts/build_swift_cli.sh

      - name: Prepare CLI asset
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/ios-use "release/${{ matrix.asset }}"
          chmod +x "release/${{ matrix.asset }}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}

  build-driver:
    name: Build driver IPAs
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build driver IPAs
        run: bash scripts/build_driver.sh

      - name: Prepare driver assets
        run: |
          set -euo pipefail
          mkdir -p release
          cp assets/driver.ipa release/driver.ipa
          cp assets/driver-sim.ipa release/driver-sim.ipa

      - name: Upload driver artifacts
        uses: actions/upload-artifact@v4
        with:
          name: driver-ipas
          path: release/*

  release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: [build-cli, build-driver]
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Prepare checksums
        run: |
          set -euo pipefail
          shasum -a 256 release/* > release/SHA256SUMS

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "Release workflow must run from a tag push or workflow_dispatch tag input." >&2
            exit 1
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: release/*
